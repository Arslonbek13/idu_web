# SonarQube project configuration
# https://docs.sonarqube.org/latest/analysis/scan/sonarscanner/

sonar.projectKey=Arslonbek13_idu_web
sonar.organization=arslonbek13
sonar.projectName=idu_web
sonar.projectVersion=1.0

# Analyze the whole project root; exclusions filter out generated/vendor artifacts
sonar.sources=.

# Python version (matches Pipfile / requirements)
sonar.python.version=3.11

# -----------------------------------------------------------------------
# Exclusions — generated, collected, vendor, cache, media, and IDE files
# -----------------------------------------------------------------------
sonar.exclusions=\
  venv/**,\
  .venv/**,\
  bin/**,\
  lib/**,\
  share/**,\
  staticfiles/**,\
  media/**,\
  locale/**,\
  **/__pycache__/**,\
  **/*.pyc,\
  **/*.pyo,\
  **/*.pyd,\
  **/migrations/**,\
  static/fonts/**,\
  static/images/**,\
  static/css/jquery.fancybox.css,\
  static/css/li-scroller.css,\
  static/css/slick.css,\
  static/css/style.css,\
  static/css/theme.css,\
  static/js/bootstrap.min.js,\
  static/js/html5shiv.min.js,\
  static/js/jquery.fancybox.pack.js,\
  static/js/jquery.li-scroller.1.0.js,\
  static/js/jquery.min.js,\
  static/js/jquery.newsTicker.min.js,\
  static/js/respond.min.js,\
  static/js/slick.min.js,\
  static/js/wow.min.js,\
  templates/news/single_page.html,\
  .git/**,\
  .idea/**,\
  .vscode/**

# Test paths (both are currently empty stubs, but correct paths for future use)
sonar.tests=accounts/tests.py,news_app/tests.py
sonar.test.exclusions=**/tests.py

# Coverage — enable once pytest-cov or coverage.py is wired in:
# sonar.python.coverage.reportPaths=coverage.xml

# Pylint report — generated by CI before the scan step.
# Enable once the CI step below is uncommented in the workflow:
# sonar.python.pylint.reportPaths=pylint-report.txt

# Encoding
sonar.sourceEncoding=UTF-8
